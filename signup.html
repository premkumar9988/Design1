<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - MyApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">MyApp.</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="signin.html">Login</a></li>
        </ul>
    </nav>

    <div class="card">
        <h2 style="text-align: center; margin-bottom: 20px;">Create Account</h2>
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="********">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
            Already have an account? <a href="signin.html" style="color: var(--primary-color);">Sign In</a>
        </p>
    </div>
</body>
</html>
