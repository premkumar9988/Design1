<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - MyApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">MyApp.</a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="profile.html" class="active">Profile</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="dashboard-grid">
            <aside class="sidebar">
                <ul>
                    <li><a href="dashboard.html">Overview</a></li>
                    <li><a href="profile.html" class="active">My Profile</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </aside>
            <main class="content-area">
                <h2>User Profile</h2>
                <div style="display: flex; align-items: center; gap: 20px; margin-top: 20px;">
                    <div style="width: 80px; height: 80px; background: #ddd; border-radius: 50%;"></div>
                    <div>
                        <h3>John Doe</h3>
                        <p style="color: var(--text-light);">john@example.com</p>
                    </div>
                </div>
                <br>
                <form>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" value="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <input type="text" value="Web Developer">
                    </div>
                    <button class="btn-primary">Save Changes</button>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
