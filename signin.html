<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - MyApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">MyApp.</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <div class="card">
        <h2 style="text-align: center; margin-bottom: 20px;">Welcome Back</h2>
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="********">
            </div>
            <div style="text-align: right; margin-bottom: 15px;">
                <a href="forgot-password.html" style="font-size: 0.8rem; color: var(--text-light);">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
        </form>
    </div>
</body>
</html>
