<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - MyApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">MyApp.</a>
    </nav>

    <div class="card">
        <h2 style="text-align: center; margin-bottom: 10px;">Reset Password</h2>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">Enter your email to receive a reset link.</p>
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Send Link</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            <a href="signin.html" style="color: var(--text-light);">Back to Login</a>
        </p>
    </div>
</body>
</html>
